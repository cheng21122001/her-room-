{% extends "base.html" %}
{% block title %}关系网络 · 与她的房间{% endblock %}
{% block content %}
<div class="page-wrap">

<section class="page-head">
  <h1 class="page-title">关系网络</h1>
  <p class="page-sub">档案之间的关联 · 点击节点查看详情</p>
</section>

<div class="network-legend">
  <span class="legend-item"><span class="legend-line legend-line--type"></span>同类型</span>
  <span class="legend-item"><span class="legend-line legend-line--region"></span>同地区</span>
  <span class="legend-item"><span class="legend-line legend-line--term"></span>共同词条</span>
</div>

<div class="network-frame">
  <svg class="network-svg" viewBox="0 0 {{ width }} {{ height }}" preserveAspectRatio="xMidYMid meet">
    {% for e in edges %}
    <line class="net-edge net-edge--{{ e['kind'] }}"
          x1="{{ e['x1'] }}" y1="{{ e['y1'] }}" x2="{{ e['x2'] }}" y2="{{ e['y2'] }}"/>
    {% endfor %}
    {% for n in nodes %}
    <a href="{{ url_for('case_detail', case_id=n['id']) }}" class="net-node">
      <circle cx="{{ n['x'] }}" cy="{{ n['y'] }}" r="7"/>
      <text x="{{ n['x'] + (14 if n['align'] == 'start' else (-14 if n['align'] == 'end' else 0)) }}"
            y="{{ n['y'] + (-16 if n['align'] == 'middle' and n['y'] < height / 2 else (26 if n['align'] == 'middle' else 5)) }}"
            text-anchor="{{ n['align'] }}">
        {{ n['name'] }}
        <tspan class="net-node-no"> {{ n['archive_no'] }}</tspan>
      </text>
    </a>
    {% endfor %}
  </svg>
</div>

</div>
{% endblock %}
