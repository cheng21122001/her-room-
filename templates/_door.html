{# 时间线用的一扇钢笔手绘门；悬停时门扇沿左侧铰链旋开，露出门后黑暗。
   img 省略时用占位门；将来可为每个案例传入各自的门图。 #}
{% macro door(year, no, name, meta, href, img=None) %}
{% set src = img or url_for('static', filename='img/doors/placeholder.jpg') %}
<a class="door-cell" href="{{ href }}">
  <div class="door-frame">
    <!-- 门后的黑暗，开门后显现 -->
    <div class="door-void">
      <span class="door-void-no">{{ no }}</span>
      <span class="door-void-cue">进入 ↗</span>
    </div>
    <!-- 门扇 -->
    <div class="door-leaf">
      <img class="door-img" src="{{ src }}" alt="" loading="lazy">
      <span class="door-year">{{ year }}</span>
    </div>
  </div>
  <span class="door-caption">{{ name }}</span>
  <span class="door-caption-meta">{{ meta }}</span>
</a>
{% endmacro %}
