{# 时间线用的一扇简笔牢门；悬停时门扇沿左侧铰链旋开，露出门后黑暗。 #}
{% macro door(year, no, name, meta, href) %}
<a class="door-cell" href="{{ href }}">
  <div class="door-frame">
    <!-- 门后的黑暗，开门后显现 -->
    <div class="door-void">
      <span class="door-void-no">{{ no }}</span>
      <span class="door-void-cue">进入 ↗</span>
    </div>
    <!-- 门扇 -->
    <div class="door-leaf">
      <svg class="door-svg" viewBox="0 0 100 170" preserveAspectRatio="none" aria-hidden="true">
        <rect class="dl" x="6" y="6" width="88" height="158"/>
        <rect class="dl" x="16" y="20" width="68" height="26"/>
        <line class="dl" x1="26" y1="20" x2="26" y2="46"/>
        <line class="dl" x1="36" y1="20" x2="36" y2="46"/>
        <line class="dl" x1="46" y1="20" x2="46" y2="46"/>
        <line class="dl" x1="56" y1="20" x2="56" y2="46"/>
        <line class="dl" x1="66" y1="20" x2="66" y2="46"/>
        <rect class="dl" x="16" y="62" width="68" height="42"/>
        <rect class="dl" x="16" y="112" width="68" height="42"/>
        <circle class="dl" cx="80" cy="90" r="3"/>
      </svg>
      <span class="door-year">{{ year }}</span>
    </div>
  </div>
  <span class="door-caption">{{ name }}</span>
  <span class="door-caption-meta">{{ meta }}</span>
</a>
{% endmacro %}
