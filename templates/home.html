<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>与她的房间</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="peep-body">

<a href="{{ url_for('overview') }}" class="peep" id="peep" aria-label="推门进入档案">
  <img
    class="peep-photo"
    src="{{ url_for('static', filename='img/peephole.jpg') }}"
    alt="鱼眼窥孔中的走廊与门"
  >
  <div class="peep-meta">
    <p class="peep-kicker">IN HER ROOM · A CASE ARCHIVE</p>
    <p class="peep-title">与 她 的 房 间</p>
    <p class="peep-hint">推 门 而 入</p>
  </div>
  <div class="peep-flood" aria-hidden="true"></div>
</a>

<script>
  (function () {
    var peep = document.getElementById("peep");
    var dest = peep.getAttribute("href");
    var going = false;
    peep.addEventListener("click", function (e) {
      if (going) return;
      going = true;
      e.preventDefault();
      document.body.classList.add("entering");
      setTimeout(function () { window.location = dest; }, 1150);
    });
  })();
</script>
</body>
</html>
